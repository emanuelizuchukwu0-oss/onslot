<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #1a1a3e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(15,25,35,0.95);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #f59e0b;
            max-width: 450px;
            width: 90%;
        }
        h1 { color: #f59e0b; margin-bottom: 20px; text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { transform: scale(1.02); }
        .result { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: rgba(16,185,129,0.2); border: 1px solid #10b981; }
        .error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; }
        .info { color: #94a3b8; font-size: 14px; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Create Admin Account</h1>
        <input type="text" id="adminName" placeholder="Full Name" value="Super Admin">
        <input type="email" id="adminEmail" placeholder="Email (will auto-add %%)" value="admin@onslot.com">
        <input type="tel" id="adminPhone" placeholder="Phone Number" value="08012345678">
        <input type="password" id="adminPassword" placeholder="Password" value="admin123">
        <button onclick="createAdmin()">Create Admin Account</button>
        <div id="result" class="result"></div>
        <div class="info">💡 After creation, login with the email and password above</div>
    </div>

    <script>
        const API_URL = 'https://onslot.onrender.com/api';
        
        async function createAdmin() {
            const name = document.getElementById('adminName').value;
            let email = document.getElementById('adminEmail').value;
            const phone = document.getElementById('adminPhone').value;
            const password = document.getElementById('adminPassword').value;
            
            // Auto-add %% if not present
            if (!email.endsWith('%%')) {
                email = email + '%%';
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div style="text-align:center;">⏳ Creating admin account...</div>';
            resultDiv.className = 'result';
            
            try {
                // First, try to create via API
                const response = await fetch(`${API_URL}/create-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div style="color: #10b981;">✅ ADMIN CREATED SUCCESSFULLY!</div>
                        <div style="margin-top: 10px;">
                            <strong>Email:</strong> ${email}<br>
                            <strong>Password:</strong> ${password}<br>
                            <strong>Wallet Balance:</strong> ₦1000
                        </div>
                        <div style="margin-top: 15px; color: #f59e0b;">👉 Now go to the main site and login!</div>
                    `;
                    resultDiv.className = 'result success';
                } else {
                    // If API fails, try signup as fallback
                    resultDiv.innerHTML = `<div style="color: #f59e0b;">⚠️ ${data.error}<br> Trying signup method...</div>`;
                    
                    const signupResponse = await fetch(`${API_URL}/signup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, phone, password, referralCode: '' })
                    });
                    
                    const signupData = await signupResponse.json();
                    
                    if (signupData.success) {
                        resultDiv.innerHTML = `
                            <div style="color: #10b981;">✅ ADMIN CREATED VIA SIGNUP!</div>
                            <div style="margin-top: 10px;">
                                <strong>Email:</strong> ${email}<br>
                                <strong>Password:</strong> ${password}
                            </div>
                            <div style="margin-top: 15px; color: #f59e0b;">👉 Now login with these credentials!</div>
                        `;
                        resultDiv.className = 'result success';
                    } else {
                        resultDiv.innerHTML = `<div style="color: #ef4444;">❌ Error: ${signupData.error || 'Unknown error'}</div>`;
                        resultDiv.className = 'result error';
                    }
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: #ef4444;">❌ Network Error: ${error.message}</div>`;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
